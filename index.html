<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hermana Academy | የኢትዮጵያ ትምህርት አስተዳደር</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      color: #1e2a3e;
    }
    /* Top Bar */
    .topbar {
      background: #0c2e42;
      color: white;
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo h2 i { margin-right: 8px; }
    .nav-links a {
      color: #e0f2fe;
      margin-left: 1.5rem;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .nav-links a:hover, .nav-links a.active { color: #ffd966; }
    .main-container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
    /* cards */
    .card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px,1fr)); gap: 1.8rem; }
    .form-group { margin-bottom: 1rem; }
    label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 5px; color: #2c5a7a; }
    input, select, textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 1rem;
      font-family: inherit;
    }
    .btn {
      background: #1f6392;
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: #0e4a6e; transform: translateY(-1px);}
    .btn-outline { background: white; border: 1px solid #1f6392; color: #1f6392; }
    .badge { padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
    .badge-paid { background: #c8f0e1; color: #166534; }
    .badge-unpaid { background: #ffe2dd; color: #b91c1c; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e4e7eb; }
    .profile-card { background: #f8fafc; border-radius: 1rem; padding: 1rem; margin-top: 1rem; }
    .update-item { background: #fef9e3; border-left: 4px solid #eab308; padding: 0.7rem; margin-bottom: 0.6rem; border-radius: 1rem; }
    @media (max-width:700px){ .topbar { flex-direction: column; } .nav-links a { margin: 0 0.7rem; } }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo"><h2><i class="fas fa-landmark"></i> Hermana Academy</h2></div>
  <div class="nav-links" id="navLinks">
    <a data-tab="student">👨‍🎓 Student Portal</a>
    <a data-tab="director">📊 Director Panel</a>
    <a data-tab="parent">👪 Parents Updates</a>
  </div>
</div>
<div class="main-container" id="appRoot"></div>

<script>
  // ----------------------- DATA STORAGE -------------------------
  let students = [];     // each: { id, fullName, ethiopianId, idPhotoUrl, grade, regDate, examScore, examPercent, payments: { term1:bool, bus:bool, activity:bool, registrationPaid:bool }, totalFees }
  let parentUpdates = []; // { id, date, title, description, type }
  let directors = [{ id:1, name:"Dr. Alemu Bekele", role:"Director" }];

  // Load initial data
  function loadData() {
    const stored = localStorage.getItem('hermana_academy_data');
    if(stored) {
      const data = JSON.parse(stored);
      students = data.students || [];
      parentUpdates = data.parentUpdates || [];
    } else {
      // demo students with sample
      students = [
        { id: 1001, fullName: "Meron Tadesse", ethiopianId: "ET1234567", idPhotoUrl: "demo_id.png", grade: "Grade 5", regDate: "2025-01-10", examScore: 85, examPercent: 85, payments: { term1: true, bus: false, activity: false, registrationPaid: true }, totalFees: 3500 },
        { id: 1002, fullName: "Henok Desta", ethiopianId: "ET7654321", idPhotoUrl: "demo_id2.png", grade: "Grade 10", regDate: "2025-01-12", examScore: 72, examPercent: 72, payments: { term1: false, bus: true, activity: false, registrationPaid: true }, totalFees: 1000 },
        { id: 1003, fullName: "Bethel Assefa", ethiopianId: "ET9988776", idPhotoUrl: "demo_id3.png", grade: "Grade 3", regDate: "2025-01-15", examScore: 94, examPercent: 94, payments: { term1: true, bus: true, activity: true, registrationPaid: true }, totalFees: 4500 }
      ];
      parentUpdates = [
        { id: 1, date: "2025-03-20", title: "🚨 School Announcement", description: "John Demissie banned for 3 days due to bullying incident.", type: "alert" },
        { id: 2, date: "2025-03-18", title: "📢 Mid-term Exams", description: "Mid-term exams start April 5. Prepare well!", type: "info" }
      ];
    }
  }
  function saveData() { localStorage.setItem('hermana_academy_data', JSON.stringify({ students, parentUpdates })); }

  // Helper: generate ID
  function generateId() { return Date.now() + Math.floor(Math.random()*10000); }

  // Helper: generate questions based on grade
  function generateExamByGrade(grade) {
    const g = parseInt(grade.replace(/\D/g,'')) || 5;
    if (g <= 4) return [
      { text: "ከተከተሉት ውስጥ 7+8 ምን ያህል ነው?", options: ["14","15","16","17"], correct:1 },
      { text: "የኢትዮጵያ ዋና ከተማ ማንነው?", options: ["ጎንደር","አዲስ አበባ","ሀዋሳ","ባህርዳር"], correct:1 },
      { text: "ከታች 2×6=?", options: ["10","12","14","18"], correct:1 }
    ];
    else if (g <= 8) return [
      { text: "Solve: 144 ÷ 12", options: ["10","12","14","16"], correct:1 },
      { text: "What is the capital of Ethiopia?", options: ["Adama","Addis Ababa","Harar","Jimma"], correct:1 },
      { text: "If a train moves 60km/h, distance in 2h?", options: ["100km","120km","140km","80km"], correct:1 },
      { text: "በኢትዮጵያ ውስጥ የሚገኝ ትልቁ ወንዝ?", options: ["አዋሽ","አባይ","ተከዜ","ጊቤ"], correct:1 }
    ];
    else return [
      { text: "Solve 3x - 5 = 16, x = ?", options: ["7","6","8","5"], correct:0 },
      { text: "Which Ethiopian region is known for coffee origin?", options: ["Tigray","Amhara","Oromia (Kaffa)","Somali"], correct:2 },
      { text: "If atomic number of Oxygen is 8, protons?", options: ["8","10","6","16"], correct:0 },
      { text: "Who wrote 'Fikir Eske Mekabir'?", options: ["Baalu Girma","Haddis Alemayehu","Tsegaye Gabre-Medhin","Mengistu Lemma"], correct:1 }
    ];
  }

  // ---------- RENDER LOGIC (multi-tab) ----------
  let activeTab = "student"; // student, director, parent

  function renderApp() {
    const root = document.getElementById('appRoot');
    if(activeTab === "student") renderStudentPortal(root);
    else if(activeTab === "director") renderDirectorPanel(root);
    else if(activeTab === "parent") renderParentUpdates(root);
    // update nav active style
    document.querySelectorAll('.nav-links a').forEach(a => {
      if(a.dataset.tab === activeTab) a.classList.add('active');
      else a.classList.remove('active');
    });
  }

  // ---------- STUDENT PORTAL: registration + exam + fee payment + profile ----------
  function renderStudentPortal(container) {
    // check if student logged in? We'll implement simple student session: select via dropdown or new registration
    let currentStudentId = sessionStorage.getItem('hermana_current_student');
    if(!currentStudentId && students.length>0) currentStudentId = students[0].id.toString();
    if(currentStudentId && students.find(s=> s.id == currentStudentId)) {
      showStudentDashboard(container, students.find(s=> s.id == currentStudentId));
    } else {
      showStudentRegistrationAndLogin(container);
    }
  }

  function showStudentRegistrationAndLogin(container) {
    container.innerHTML = `
      <div class="card">
        <h2><i class="fas fa-id-card"></i> Student Registration / Login</h2>
        <div class="grid-2">
          <div>
            <h3>📝 New Registration (Ethiopian ID + Photo)</h3>
            <form id="registerForm">
              <div class="form-group"><label>Full Name</label><input id="regName" required></div>
              <div class="form-group"><label>Ethiopian National ID (e.g., ET1234567)</label><input id="regEthiopianId" required></div>
              <div class="form-group"><label>Upload ID Photo (URL or base64 demo)</label><input id="regPhotoUrl" placeholder="https://... or type 'demo'"></div>
              <div class="form-group"><label>Grade (Grade 1 - Grade 12)</label><select id="regGrade">
                ${[...Array(12)].map((_,i)=> `<option value="Grade ${i+1}">Grade ${i+1}</option>`).join('')}
              </select></div>
              <button type="submit" class="btn">Register & Take Exam</button>
            </form>
          </div>
          <div>
            <h3>🔐 Existing Student Login</h3>
            <select id="studentLoginSelect">
              <option value="">-- Select Student --</option>
              ${students.map(s=> `<option value="${s.id}">${s.fullName} (ID: ${s.ethiopianId})</option>`).join('')}
            </select>
            <button id="loginBtn" class="btn" style="margin-top:1rem;">Login to Dashboard</button>
          </div>
        </div>
        <div id="examArea" style="margin-top:1rem;"></div>
      </div>
    `;
    document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const ethId = document.getElementById('regEthiopianId').value.trim();
      let photoUrl = document.getElementById('regPhotoUrl').value.trim() || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
      const grade = document.getElementById('regGrade').value;
      if(!name || !ethId) return alert("Full name & Ethiopian ID required");
      const existing = students.find(s=> s.ethiopianId === ethId);
      if(existing) return alert("Student with this Ethiopian ID already exists! Login instead.");
      // proceed exam
      const questions = generateExamByGrade(grade);
      const examHtml = `<div class="card"><h3>✍️ ${grade} Ability Exam</h3>${questions.map((q,idx)=>`<div><p><strong>${idx+1}. ${q.text}</strong></p>${q.options.map((opt,optIdx)=>`<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>&nbsp;&nbsp;</label>`).join('')}</div>`).join('')}<button id="submitExamBtn" class="btn">Submit Exam</button></div>`;
      document.getElementById('examArea').innerHTML = examHtml;
      const tempStudent = { name, ethId, photoUrl, grade, questions };
      window.tempReg = tempStudent;
      document.getElementById('submitExamBtn')?.addEventListener('click', () => {
        let correct = 0;
        tempStudent.questions.forEach((q,idx)=>{
          const selected = document.querySelector(`input[name="q${idx}"]:checked`);
          if(selected && parseInt(selected.value) === q.correct) correct++;
        });
        const percent = Math.round((correct / tempStudent.questions.length)*100);
        const newStudent = {
          id: generateId(),
          fullName: tempStudent.name,
          ethiopianId: tempStudent.ethId,
          idPhotoUrl: tempStudent.photoUrl,
          grade: tempStudent.grade,
          regDate: new Date().toISOString(),
          examScore: correct,
          examPercent: percent,
          payments: { term1: false, bus: false, activity: false, registrationPaid: false },
          totalFees: 0
        };
        students.push(newStudent);
        saveData();
        alert(`Exam completed! Score: ${correct}/${tempStudent.questions.length} (${percent}%). Now proceed to pay registration fee (1000 Birr).`);
        sessionStorage.setItem('hermana_current_student', newStudent.id);
        renderApp();
      });
    });
    document.getElementById('loginBtn')?.addEventListener('click',()=>{
      const selected = document.getElementById('studentLoginSelect').value;
      if(!selected) return alert("select student");
      sessionStorage.setItem('hermana_current_student', selected);
      renderApp();
    });
  }

  function showStudentDashboard(container, student) {
    const term1Paid = student.payments?.term1 || false;
    const busPaid = student.payments?.bus || false;
    const activityPaid = student.payments?.activity || false;
    const regPaid = student.payments?.registrationPaid || false;
    const totalDue = (term1Paid?0:2500) + (busPaid?0:1000) + (activityPaid?0:500) + (regPaid?0:1000);
    container.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
          <h2><i class="fas fa-user-graduate"></i> Student Dashboard: ${student.fullName}</h2>
          <button id="logoutBtn" class="btn-outline btn" style="background:#eef2ff;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div class="profile-card">
          <p><strong>📘 Ethiopian ID:</strong> ${student.ethiopianId} &nbsp;| <strong>🎓 Grade:</strong> ${student.grade} &nbsp;| <strong>📊 Exam Score:</strong> ${student.examPercent}%</p>
          <p><strong>🖼️ ID Photo:</strong> <img src="${student.idPhotoUrl}" style="width:50px; border-radius:50%;" onerror="this.src='https://via.placeholder.com/50'"> </p>
        </div>
        <h3>💰 Fee Payments (Ethiopian Birr)</h3>
        <table>
          <tr><th>Fee Type</th><th>Amount (ETB)</th><th>Status</th><th>Action</th></tr>
          <tr><td>Registration Fee</td><td>1000</td><td>${regPaid ? '<span class="badge badge-paid">Paid</span>' : '<span class="badge badge-unpaid">Unpaid</span>'}</td><td>${!regPaid ? `<button class="btn-sm payBtn" data-type="registration">Pay Now</button>` : '✅'}</td></tr>
          <tr><td>Term 1 Tuition</td><td>2500</td><td>${term1Paid ? '<span class="badge badge-paid">Paid</span>' : '<span class="badge badge-unpaid">Unpaid</span>'}</td><td>${!term1Paid ? `<button class="btn-sm payBtn" data-type="term1">Pay 2500 ETB</button>` : '✅'}</td></tr>
          <tr><td>Bus Fee</td><td>1000</td><td>${busPaid ? '<span class="badge badge-paid">Paid</span>' : '<span class="badge badge-unpaid">Unpaid</span>'}</td><td>${!busPaid ? `<button class="btn-sm payBtn" data-type="bus">Pay 1000 ETB</button>` : '✅'}</td></tr>
          <tr><td>Activity/Sports Fee</td><td>500</td><td>${activityPaid ? '<span class="badge badge-paid">Paid</span>' : '<span class="badge badge-unpaid">Unpaid</span>'}</td><td>${!activityPaid ? `<button class="btn-sm payBtn" data-type="activity">Pay 500 ETB</button>` : '✅'}</td></tr>
          <tr style="font-weight:bold;"><td>Total Outstanding</td><td colspan="3">${totalDue} ETB</td></tr>
        </table>
        <div id="receiptDisplay" style="margin-top:1rem;"></div>
      </div>
    `;
    // attach pay events
    document.querySelectorAll('.payBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const type = btn.dataset.type;
        let amount = 0;
        if(type === 'registration') amount = 1000;
        else if(type === 'term1') amount = 2500;
        else if(type === 'bus') amount = 1000;
        else if(type === 'activity') amount = 500;
        if(!confirm(`Pay ${amount} ETB for ${type}? (Demo payment)`)) return;
        // simulate payment
        if(!student.payments) student.payments = { term1:false, bus:false, activity:false, registrationPaid:false };
        if(type === 'registration') student.payments.registrationPaid = true;
        if(type === 'term1') student.payments.term1 = true;
        if(type === 'bus') student.payments.bus = true;
        if(type === 'activity') student.payments.activity = true;
        const transactionId = 'HMTX-'+Date.now();
        saveData();
        // receipt generation
        const receiptDiv = document.getElementById('receiptDisplay');
        receiptDiv.innerHTML = `<div style="background:#e6f7ec; border-radius:1rem; padding:1rem;"><i class="fas fa-receipt"></i> ✅ Payment successful! Receipt: ${amount} ETB for ${type} | Txn: ${transactionId} | Date: ${new Date().toLocaleString()}<br><button id="downloadReceiptBtn" class="btn-outline btn" style="margin-top:6px;">Download Receipt</button></div>`;
        document.getElementById('downloadReceiptBtn')?.addEventListener('click',()=>{
          const receiptText = `HERMANA ACADEMY RECEIPT\nStudent: ${student.fullName}\nID: ${student.ethiopianId}\nFee Type: ${type}\nAmount: ${amount} ETB\nTransaction: ${transactionId}\nDate: ${new Date()}\nThank you!`;
          const blob = new Blob([receiptText], {type: 'text/plain'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `receipt_${type}.txt`;
          a.click();
        });
        setTimeout(()=> renderStudentPortal(container), 1500);
      });
    });
    document.getElementById('logoutBtn')?.addEventListener('click',()=>{
      sessionStorage.removeItem('hermana_current_student');
      renderApp();
    });
  }

  // ---------- DIRECTOR PANEL: View students by grade sets, payment status, manage updates ----------
  function renderDirectorPanel(container) {
    const gradesSet = [...new Set(students.map(s=> s.grade))].sort();
    container.innerHTML = `
      <div class="card">
        <h2><i class="fas fa-chalkboard-user"></i> Director Panel - Student Management</h2>
        <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem;">
          <button id="showAllStudentsBtn" class="btn">📋 All Students</button>
          <button id="addSchoolUpdateBtn" class="btn-outline btn"><i class="fas fa-bullhorn"></i> Add Parent Update</button>
        </div>
        <div id="directorContent">
          <h3>Filter by Grade & Payment Status</h3>
          <div style="display:flex; gap:0.8rem; flex-wrap:wrap; margin-bottom:1rem;">
            <select id="gradeFilter"><option value="">All Grades</option>${gradesSet.map(g=>`<option>${g}</option>`).join('')}</select>
            <select id="paymentFilter"><option value="">All</option><option value="paid">Paid Full Fees</option><option value="unpaid">Has Unpaid</option></select>
            <button id="applyFilter" class="btn-sm btn">Filter</button>
          </div>
          <div id="studentsTable"></div>
        </div>
        <div id="schoolUpdatesAdmin" style="margin-top:2rem;"><h3>School Updates (Visible to Parents)</h3><div id="updatesListAdmin"></div></div>
      </div>
    `;
    function renderStudentsTable(gradeFilter, paymentFilter) {
      let filtered = students;
      if(gradeFilter) filtered = filtered.filter(s=> s.grade === gradeFilter);
      if(paymentFilter === "paid") filtered = filtered.filter(s=> s.payments?.term1 && s.payments?.bus && s.payments?.registrationPaid);
      else if(paymentFilter === "unpaid") filtered = filtered.filter(s=> !(s.payments?.term1 && s.payments?.bus && s.payments?.registrationPaid));
      const tableHtml = `<table><thead><tr><th>Name</th><th>Ethiopian ID</th><th>Grade</th><th>Exam %</th><th>Registration</th><th>Term1</th><th>Bus</th><th>Activity</th><th>Status</th></tr></thead><tbody>
        ${filtered.map(s=>`<tr><td>${s.fullName}</td><td>${s.ethiopianId}</td><td>${s.grade}</td><td>${s.examPercent}%</td><td>${s.payments?.registrationPaid?'✅':'❌'}</td><td>${s.payments?.term1?'✅':'❌'}</td><td>${s.payments?.bus?'✅':'❌'}</td><td>${s.payments?.activity?'✅':'❌'}</td><td class="${(s.payments?.term1 && s.payments?.bus && s.payments?.registrationPaid)?'badge-paid':'badge-unpaid'}">${(s.payments?.term1 && s.payments?.bus && s.payments?.registrationPaid)?'Fully Paid':'Pending'}</td></tr>`).join('')}
      </tbody></table>`;
      document.getElementById('studentsTable').innerHTML = tableHtml;
    }
    function renderUpdatesAdmin() {
      const updatesDiv = document.getElementById('updatesListAdmin');
      if(updatesDiv) updatesDiv.innerHTML = parentUpdates.map(u=>`<div class="update-item"><strong>${u.date}</strong> - ${u.title}<br>${u.description}</div>`).join('') || '<i>No updates</i>';
    }
    renderStudentsTable('','');
    renderUpdatesAdmin();
    document.getElementById('applyFilter')?.addEventListener('click',()=>{
      const grade = document.getElementById('gradeFilter').value;
      const payment = document.getElementById('paymentFilter').value;
      renderStudentsTable(grade, payment);
    });
    document.getElementById('showAllStudentsBtn')?.addEventListener('click',()=> renderStudentsTable('',''));
    document.getElementById('addSchoolUpdateBtn')?.addEventListener('click',()=>{
      const title = prompt("Update Title (e.g., Today John banned reason...)");
      if(!title) return;
      const desc = prompt("Description details:");
      parentUpdates.unshift({ id: Date.now(), date: new Date().toLocaleDateString(), title, description: desc || "", type: "alert" });
      saveData();
      renderUpdatesAdmin();
      alert("Update added. Parents will see it.");
    });
  }

  // ---------- PARENT UPDATES: view school announcements, bans, etc ----------
  function renderParentUpdates(container) {
    container.innerHTML = `
      <div class="card">
        <h2><i class="fas fa-bell"></i> Parents Information Hub</h2>
        <p>Real-time school updates, student conduct, and announcements.</p>
        <div id="parentNewsFeed"></div>
        <div class="profile-card" style="margin-top:1rem;">
          <h3>📢 Important: Hermana Code of Conduct</h3>
          <p>Any student violating school rules may face suspension. Latest updates below:</p>
        </div>
      </div>
    `;
    const feedDiv = document.getElementById('parentNewsFeed');
    if(parentUpdates.length===0) feedDiv.innerHTML = "<div class='update-item'>No updates yet. Stay tuned.</div>";
    else feedDiv.innerHTML = parentUpdates.map(up => `<div class="update-item"><i class="fas fa-newspaper"></i> <strong>${up.date}</strong> · ${up.title}<br><span style="font-size:0.9rem;">${up.description}</span></div>`).join('');
    // additional demo: show banned example
  }

  // Set tab event listeners
  function bindNavEvents() {
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', (e) => {
        activeTab = link.dataset.tab;
        renderApp();
      });
    });
  }
  loadData();
  bindNavEvents();
  renderApp();
</script>
</body>
</html>
