<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hermana Academy | Smart Enrollment Portal</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .academy-container {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* header */
    .hero {
      text-align: center;
      margin-bottom: 2.2rem;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(120deg, #0F2B3D, #1B4A6F);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .hero .tagline {
      color: #2c3e66;
      font-weight: 500;
      margin-top: 0.4rem;
    }

    /* step indicator */
    .step-progress {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      background: white;
      padding: 1rem 1.8rem;
      border-radius: 80px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.05);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .step-item {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }
    .step-item.active {
      color: #1e4a76;
    }
    .step-item.completed {
      color: #15803d;
    }
    .step-icon {
      background: #f1f5f9;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
      font-size: 0.9rem;
    }
    .step-item.active .step-icon {
      background: #1e4a76;
      color: white;
    }
    .step-item.completed .step-icon {
      background: #15803d;
      color: white;
    }

    /* main card */
    .main-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
      padding: 2rem 2rem;
      transition: all 0.2s;
    }

    /* form styles */
    .form-group {
      margin-bottom: 1.3rem;
    }
    label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f3a5f;
      margin-bottom: 0.3rem;
      display: block;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      font-family: inherit;
      transition: 0.2s;
      background: #fefefe;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #2c6e9e;
      box-shadow: 0 0 0 3px rgba(44,110,158,0.1);
    }
    .btn-primary {
      background: #1f4e79;
      border: none;
      padding: 0.9rem 1.4rem;
      border-radius: 2rem;
      font-weight: 700;
      color: white;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #0e3b5c;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: #eef2ff;
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      color: #1f4e79;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .exam-question {
      background: #f8fafc;
      padding: 1rem;
      border-radius: 1.2rem;
      margin-bottom: 1.2rem;
      border-left: 5px solid #2c6e9e;
    }
    .options {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .option-radio {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }
    .receipt-card {
      background: #fef9e6;
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid #ffe2a4;
      font-family: monospace;
    }
    .alert-badge {
      background: #e6f7ec;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      margin-top: 0.8rem;
      text-align: center;
    }
    .flex-btns {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .dashboard-preview {
      background: linear-gradient(145deg, #f0f9ff, #e9f2fa);
      border-radius: 1.5rem;
      padding: 1.4rem;
    }
    hr {
      margin: 1rem 0;
    }
    @media (max-width: 680px) {
      body { padding: 1rem; }
      .main-card { padding: 1.2rem; }
      .step-progress { border-radius: 2rem; }
    }
  </style>
</head>
<body>
<div class="academy-container">
  <div class="hero">
    <h1><i class="fas fa-graduation-cap"></i> Hermana Academy</h1>
    <div class="tagline">Intelligent Enrollment · Ability Exam · Secure Payment · Smart Receipt</div>
  </div>

  <!-- Step Progress -->
  <div class="step-progress" id="stepProgress">
    <div class="step-item" data-step="1"><span class="step-icon">1</span> Register</div>
    <div class="step-item" data-step="2"><span class="step-icon">2</span> Ability Exam</div>
    <div class="step-item" data-step="3"><span class="step-icon">3</span> Payment</div>
    <div class="step-item" data-step="4"><span class="step-icon">4</span> Receipt & Bot</div>
    <div class="step-item" data-step="5"><span class="step-icon">5</span> Enter Web</div>
  </div>

  <div class="main-card" id="appContainer">
    <!-- DYNAMIC STEP CONTENT WILL BE RENDERED HERE -->
    <div id="stepContent"></div>
  </div>
</div>

<script>
  // ------------------- DATA STATE -------------------
  let studentData = null;         // { name, email, grade, parentPhone, regDate }
  let examScore = null;           // { total, correct, percentage, answers }
  let examQuestions = [];
  let paymentCompleted = false;
  let transactionId = null;
  let receiptData = null;

  // Local storage persistence
  function loadState() {
    const saved = localStorage.getItem('hermana_enrollment');
    if (saved) {
      try {
        const state = JSON.parse(saved);
        studentData = state.studentData;
        examScore = state.examScore;
        examQuestions = state.examQuestions || [];
        paymentCompleted = state.paymentCompleted || false;
        transactionId = state.transactionId;
        receiptData = state.receiptData;
      } catch(e) {}
    }
    // ensure step integrity
  }
  function saveState() {
    const state = { studentData, examScore, examQuestions, paymentCompleted, transactionId, receiptData };
    localStorage.setItem('hermana_enrollment', JSON.stringify(state));
  }

  // Helper: generate questions based on grade
  function generateQuestionsForGrade(grade) {
    const gradeLower = grade.toLowerCase();
    if (gradeLower.includes('grade 1') || gradeLower.includes('grade 2') || grade === 'Grade 1' || grade === 'Grade 2') {
      return [
        { text: "What is 12 + 7?", options: ["18", "19", "20", "21"], correct: 1 },
        { text: "Which animal is known as the 'King of the Jungle'?", options: ["Elephant", "Tiger", "Lion", "Giraffe"], correct: 2 },
        { text: "What is 5 × 3?", options: ["12", "15", "18", "20"], correct: 1 },
        { text: "What color are bananas when ripe?", options: ["Red", "Green", "Yellow", "Blue"], correct: 2 },
        { text: "Which shape has 3 sides?", options: ["Square", "Circle", "Triangle", "Rectangle"], correct: 2 }
      ];
    } else if (gradeLower.includes('grade 3') || gradeLower.includes('grade 4') || gradeLower.includes('grade 5')) {
      return [
        { text: "Solve: 144 ÷ 12", options: ["10", "12", "14", "16"], correct: 1 },
        { text: "What is the capital of France?", options: ["Berlin", "Madrid", "Paris", "Lisbon"], correct: 2 },
        { text: "Fraction equivalent to 0.75?", options: ["1/4", "2/3", "3/4", "4/5"], correct: 2 },
        { text: "'Fast' is opposite of?", options: ["Quick", "Slow", "Rapid", "Speedy"], correct: 1 },
        { text: "Perimeter of square side 6cm?", options: ["24cm", "36cm", "12cm", "18cm"], correct: 0 }
      ];
    } else {
      // middle/high school more advanced
      return [
        { text: "Solve: 3x - 7 = 11. What is x?", options: ["4", "5", "6", "7"], correct: 2 },
        { text: "Which element has the chemical symbol 'O'?", options: ["Gold", "Oxygen", "Osmium", "Hydrogen"], correct: 1 },
        { text: "What is the square root of 144?", options: ["10", "11", "12", "13"], correct: 2 },
        { text: "Who wrote 'Romeo and Juliet'?", options: ["Charles Dickens", "Jane Austen", "Mark Twain", "William Shakespeare"], correct: 3 },
        { text: "If a train travels 60 miles per hour, how far in 2.5 hours?", options: ["120 miles", "150 miles", "180 miles", "100 miles"], correct: 1 }
      ];
    }
  }

  // Render logic (step based on current progress)
  let currentStep = 1; // 1-5

  function getCurrentStepBasedOnProgress() {
    if (!studentData) return 1;
    if (!examScore) return 2;
    if (!paymentCompleted) return 3;
    if (!receiptData) return 4;
    return 5;
  }

  function updateStepUI() {
    const steps = document.querySelectorAll('.step-item');
    steps.forEach((stepEl, idx) => {
      const stepNum = idx+1;
      stepEl.classList.remove('active', 'completed');
      if (stepNum < currentStep) stepEl.classList.add('completed');
      else if (stepNum === currentStep) stepEl.classList.add('active');
    });
  }

  function renderStep() {
    const container = document.getElementById('stepContent');
    if (!container) return;
    if (currentStep === 1) renderRegistrationStep(container);
    else if (currentStep === 2) renderExamStep(container);
    else if (currentStep === 3) renderPaymentStep(container);
    else if (currentStep === 4) renderReceiptBotStep(container);
    else if (currentStep === 5) renderWebDashboard(container);
    updateStepUI();
  }

  // STEP 1: REGISTRATION
  function renderRegistrationStep(container) {
    container.innerHTML = `
      <h2 style="margin-bottom: 1rem;"><i class="fas fa-user-edit"></i> Register at Hermana Academy</h2>
      <form id="regForm">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" value="${studentData?.name || ''}" placeholder="e.g., Isabella Reyes" required>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" value="${studentData?.email || ''}" placeholder="student@hermana.edu" required>
        </div>
        <div class="form-group">
          <label>Parent/Guardian Phone</label>
          <input type="text" id="phone" value="${studentData?.parentPhone || ''}" placeholder="+123456789">
        </div>
        <div class="form-group">
          <label>Select Grade Level *</label>
          <select id="gradeSelect">
            <option value="Grade 1" ${studentData?.grade === 'Grade 1' ? 'selected' : ''}>Grade 1</option>
            <option value="Grade 2" ${studentData?.grade === 'Grade 2' ? 'selected' : ''}>Grade 2</option>
            <option value="Grade 3" ${studentData?.grade === 'Grade 3' ? 'selected' : ''}>Grade 3</option>
            <option value="Grade 4" ${studentData?.grade === 'Grade 4' ? 'selected' : ''}>Grade 4</option>
            <option value="Grade 5" ${studentData?.grade === 'Grade 5' ? 'selected' : ''}>Grade 5</option>
            <option value="Middle School" ${studentData?.grade === 'Middle School' ? 'selected' : ''}>Middle School</option>
            <option value="High School" ${studentData?.grade === 'High School' ? 'selected' : ''}>High School</option>
          </select>
        </div>
        <button type="submit" class="btn-primary"><i class="fas fa-arrow-right"></i> Register & Continue</button>
      </form>
    `;
    document.getElementById('regForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const grade = document.getElementById('gradeSelect').value;
      if (!name || !email) {
        alert("Please fill name and email.");
        return;
      }
      if (!email.includes('@')) { alert("Valid email required"); return; }
      studentData = { name, email, parentPhone: phone, grade, regDate: new Date().toISOString() };
      // reset exam & payment when new registration
      examScore = null;
      paymentCompleted = false;
      transactionId = null;
      receiptData = null;
      examQuestions = generateQuestionsForGrade(grade);
      saveState();
      currentStep = 2;
      renderStep();
    });
  }

  // STEP 2: EXAM (ability test based on grade)
  function renderExamStep(container) {
    if (!studentData) {
      currentStep = 1;
      renderStep();
      return;
    }
    const questions = examQuestions.length ? examQuestions : generateQuestionsForGrade(studentData.grade);
    examQuestions = questions;
    saveState();
    let answersHtml = '';
    questions.forEach((q, idx) => {
      answersHtml += `
        <div class="exam-question">
          <strong>${idx+1}. ${q.text}</strong>
          <div class="options">
            ${q.options.map((opt, optIdx) => `
              <label class="option-radio">
                <input type="radio" name="q${idx}" value="${optIdx}"> ${opt}
              </label>
            `).join('')}
          </div>
        </div>
      `;
    });
    container.innerHTML = `
      <h2><i class="fas fa-brain"></i> Ability Assessment (${studentData.grade} level)</h2>
      <p style="margin-bottom: 1rem;">Answer all questions to evaluate your readiness. ${examScore ? 'Your previous score: ' + examScore.percentage + '% - you can retake.' : ''}</p>
      <form id="examForm">
        ${answersHtml}
        <button type="submit" class="btn-primary"><i class="fas fa-check-double"></i> Submit Exam</button>
        ${examScore ? `<button type="button" id="retakeExamBtn" class="btn-secondary" style="margin-top: 0.6rem;"><i class="fas fa-redo-alt"></i> Retake Exam</button>` : ''}
      </form>
      <div id="examResultMsg" style="margin-top: 1rem;"></div>
    `;
    const examForm = document.getElementById('examForm');
    examForm?.addEventListener('submit', (e) => {
      e.preventDefault();
      let correctCount = 0;
      for (let i = 0; i < examQuestions.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected && parseInt(selected.value) === examQuestions[i].correct) correctCount++;
      }
      const total = examQuestions.length;
      const percent = Math.round((correctCount/total)*100);
      examScore = { total, correct: correctCount, percentage: percent, date: new Date().toISOString() };
      saveState();
      const msgDiv = document.getElementById('examResultMsg');
      msgDiv.innerHTML = `<div class="alert-badge" style="background:#d9f0ec;">✅ Exam completed! Score: ${correctCount}/${total} (${percent}%). You can now proceed to payment.</div>`;
      // auto enable step but only if exam exists.
      setTimeout(() => {
        currentStep = 3;
        renderStep();
      }, 1500);
    });
    const retakeBtn = document.getElementById('retakeExamBtn');
    if (retakeBtn) retakeBtn.addEventListener('click', () => {
      examScore = null;
      saveState();
      renderExamStep(container);
    });
  }

  // STEP 3: PAYMENT (registration fee)
  function renderPaymentStep(container) {
    if (!studentData || !examScore) {
      currentStep = 2;
      renderStep();
      return;
    }
    const feeAmount = 79; // registration fee USD
    container.innerHTML = `
      <h2><i class="fas fa-credit-card"></i> Pay Registration Fee ($${feeAmount})</h2>
      <p><strong>Student:</strong> ${studentData.name} | Grade: ${studentData.grade} | Exam Score: ${examScore.percentage}%</p>
      <div class="form-group">
        <label>Cardholder Name</label>
        <input type="text" id="cardName" placeholder="Full name on card">
      </div>
      <div class="form-group">
        <label>Card Number (demo)</label>
        <input type="text" id="cardNumber" placeholder="4242 4242 4242 4242">
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Expiry (MM/YY)</label><input type="text" id="expiry" placeholder="08/28"></div>
        <div class="form-group"><label>CVV</label><input type="text" id="cvv" placeholder="123"></div>
      </div>
      <button id="payNowBtn" class="btn-primary"><i class="fas fa-lock"></i> Pay $${feeAmount} & Generate Receipt</button>
      <div id="payMsg" style="margin-top: 1rem;"></div>
    `;
    document.getElementById('payNowBtn')?.addEventListener('click', () => {
      const cardName = document.getElementById('cardName').value.trim();
      const cardNum = document.getElementById('cardNumber').value.trim();
      if (!cardName || cardNum.length < 10) {
        document.getElementById('payMsg').innerHTML = '<div class="alert-badge" style="background:#ffe0db;">⚠️ Fill valid card details (demo).</div>';
        return;
      }
      // simulate payment
      transactionId = 'HA-' + Date.now() + '-' + Math.floor(Math.random()*10000);
      paymentCompleted = true;
      // build receipt object
      receiptData = {
        studentName: studentData.name,
        studentEmail: studentData.email,
        grade: studentData.grade,
        examPercent: examScore.percentage,
        examCorrect: `${examScore.correct}/${examScore.total}`,
        amountPaid: feeAmount,
        transactionId: transactionId,
        paymentDate: new Date().toLocaleString(),
        academy: "Hermana Academy"
      };
      saveState();
      document.getElementById('payMsg').innerHTML = '<div class="alert-badge" style="background:#c8e6df;">✓ Payment successful! Redirecting to receipt...</div>';
      setTimeout(() => {
        currentStep = 4;
        renderStep();
      }, 1200);
    });
  }

  // STEP 4: RECEIPT + SEND TO BOT + SAVE
  function renderReceiptBotStep(container) {
    if (!receiptData || !paymentCompleted) {
      currentStep = 3;
      renderStep();
      return;
    }
    const rec = receiptData;
    const receiptHtml = `
      <div class="receipt-card" id="receiptContainer">
        <div style="text-align:center;"><i class="fas fa-scroll"></i> <strong>HERMANA ACADEMY OFFICIAL RECEIPT</strong></div>
        <hr>
        <p><strong>Student:</strong> ${rec.studentName}</p>
        <p><strong>Email:</strong> ${rec.studentEmail}</p>
        <p><strong>Grade:</strong> ${rec.grade}</p>
        <p><strong>Ability Exam Score:</strong> ${rec.examPercent}% (${rec.examCorrect})</p>
        <p><strong>Registration Fee:</strong> $${rec.amountPaid} USD</p>
        <p><strong>Transaction ID:</strong> ${rec.transactionId}</p>
        <p><strong>Date:</strong> ${rec.paymentDate}</p>
        <hr>
        <p style="font-size:0.7rem;">* This receipt confirms enrollment & exam. Keep for records.</p>
      </div>
    `;
    container.innerHTML = `
      <h2><i class="fas fa-receipt"></i> Enrollment Receipt</h2>
      ${receiptHtml}
      <div class="flex-btns">
        <button id="saveReceiptBtn" class="btn-secondary"><i class="fas fa-download"></i> Save Receipt (Text)</button>
        <button id="sendToBotBtn" class="btn-primary"><i class="fab fa-telegram"></i> Send to Hermana Bot</button>
        <button id="printReceiptBtn" class="btn-secondary"><i class="fas fa-print"></i> Print Receipt</button>
      </div>
      <div id="botFeedback" class="alert-badge" style="margin-top: 1rem;"></div>
      <div style="margin-top: 1.5rem; text-align:center;">
        <button id="proceedToWebBtn" class="btn-primary"><i class="fas fa-globe"></i> Enter Web Portal →</button>
      </div>
    `;
    // Save receipt as .txt
    document.getElementById('saveReceiptBtn')?.addEventListener('click', () => {
      let receiptText = `HERMANA ACADEMY RECEIPT\n----------------------\nStudent: ${rec.studentName}\nEmail: ${rec.studentEmail}\nGrade: ${rec.grade}\nExam Score: ${rec.examPercent}%\nFee Paid: $${rec.amountPaid}\nTxn ID: ${rec.transactionId}\nDate: ${rec.paymentDate}\n----------------------\nThank you for enrolling!`;
      const blob = new Blob([receiptText], {type: "text/plain"});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `Hermana_Receipt_${rec.transactionId}.txt`;
      link.click();
      URL.revokeObjectURL(link.href);
      document.getElementById('botFeedback').innerHTML = "✅ Receipt saved locally!";
      setTimeout(() => document.getElementById('botFeedback').innerHTML = "", 2000);
    });
    // send to bot simulation
    document.getElementById('sendToBotBtn')?.addEventListener('click', () => {
      // simulate sending to a bot (Telegram/WhatsApp)
      const fakeBotMessage = `📢 *Hermana Academy Bot* 📢\n✅ Receipt forwarded to official Hermana support bot.\nStudent: ${rec.studentName}\nTxn: ${rec.transactionId}\nWe'll contact you within 24h for orientation.`;
      alert("🤖 BOT SIMULATION: " + fakeBotMessage + "\n\n[In production, this sends the receipt to Hermana Academy's enrollment bot]");
      document.getElementById('botFeedback').innerHTML = "📨 Receipt sent to Hermana Bot! Check your linked chat.";
      setTimeout(() => document.getElementById('botFeedback').innerHTML = "", 3000);
    });
    // print receipt
    document.getElementById('printReceiptBtn')?.addEventListener('click', () => {
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`<html><head><title>Hermana Receipt</title><style>body{font-family:sans-serif;padding:2rem}</style></head><body>${document.getElementById('receiptContainer').outerHTML}</body></html>`);
      printWindow.document.close();
      printWindow.print();
    });
    document.getElementById('proceedToWebBtn')?.addEventListener('click', () => {
      currentStep = 5;
      renderStep();
    });
  }

  // STEP 5: ENTER THE WEB (Student Dashboard)
  function renderWebDashboard(container) {
    if (!studentData) {
      currentStep = 1;
      renderStep();
      return;
    }
    container.innerHTML = `
      <h2><i class="fas fa-chalkboard-user"></i> Welcome to Hermana Academy Portal, ${studentData.name}!</h2>
      <div class="dashboard-preview">
        <p><i class="fas fa-id-card"></i> <strong>Enrollment status:</strong> Active ✅</p>
        <p><i class="fas fa-chart-line"></i> <strong>Ability Exam:</strong> ${examScore?.percentage || 'N/A'}% - Level: ${examScore?.percentage >= 70 ? 'Advanced Track' : 'Foundation Track'}</p>
        <p><i class="fas fa-calendar-alt"></i> <strong>Next steps:</strong> Orientation on ${new Date(Date.now() + 7*86400000).toLocaleDateString()}</p>
        <p><i class="fas fa-book-open"></i> Learning materials & parent portal ready.</p>
        <hr>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
          <button id="resetPortalBtn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Start Over (Reset)</button>
          <button id="downloadFullRecordBtn" class="btn-secondary"><i class="fas fa-file-alt"></i> Download Enrollment Summary</button>
        </div>
      </div>
    `;
    document.getElementById('resetPortalBtn')?.addEventListener('click', () => {
      if(confirm("This will clear all enrollment data. Proceed?")) {
        localStorage.removeItem('hermana_enrollment');
        studentData = null; examScore = null; paymentCompleted = false; receiptData = null; transactionId = null;
        currentStep = 1;
        renderStep();
      }
    });
    document.getElementById('downloadFullRecordBtn')?.addEventListener('click', () => {
      let dataStr = `HERMANA ACADEMY ENROLLMENT SUMMARY\nStudent: ${studentData.name}\nEmail: ${studentData.email}\nGrade: ${studentData.grade}\nExam Score: ${examScore?.percentage || 'N/A'}%\nPayment ID: ${transactionId || 'pending'}\nReceipt: ${receiptData ? 'Completed' : 'Not paid'}`;
      const blob = new Blob([dataStr], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'hermana_enrollment.txt';
      a.click();
    });
  }

  // main navigation check integrity
  function navigateToStep(step) {
    if (step === 2 && !studentData) { alert("Please complete registration first."); return; }
    if (step === 3 && (!studentData || !examScore)) { alert("You must complete the ability exam first."); return; }
    if (step === 4 && (!paymentCompleted || !receiptData)) { alert("Complete payment to generate receipt."); return; }
    if (step === 5 && (!receiptData)) { alert("Please finalize receipt first."); return; }
    currentStep = step;
    renderStep();
  }

  // Attach step clicks (optional)
  function bindStepClicks() {
    const stepDivs = document.querySelectorAll('.step-item');
    stepDivs.forEach((div, idx) => {
      div.addEventListener('click', () => {
        const targetStep = idx+1;
        if (targetStep === 1) { currentStep = 1; renderStep(); }
        else if (targetStep === 2 && studentData) navigateToStep(2);
        else if (targetStep === 3 && examScore) navigateToStep(3);
        else if (targetStep === 4 && paymentCompleted) navigateToStep(4);
        else if (targetStep === 5 && receiptData) navigateToStep(5);
        else if (targetStep === 1) navigateToStep(1);
        else alert("Please follow the sequential enrollment process.");
      });
    });
  }

  // initial load
  loadState();
  currentStep = getCurrentStepBasedOnProgress();
  renderStep();
  bindStepClicks();
</script>
</body>
  </html>
